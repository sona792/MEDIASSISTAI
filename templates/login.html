<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
    animation: fadeIn 1s ease;
}

input, button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button {
    background:#667eea;
    color:white;
    border:none;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="box">
<h2>🏥 MediAssist AI</h2>

<form action="/login" method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button style="background:#667eea;color:white;border:none;padding:10px;border-radius:8px;">Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
