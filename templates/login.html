<!DOCTYPE html>
<html>
<head>
<title>MediAssist AI - Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* background */
.bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.box{
background:white;
padding:40px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#0d6efd;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1576091160550-2173dba999ef">
<div class="overlay"></div>

<div class="box">

<h2>🏥 MediAssist AI</h2>
<p>Smart Healthcare Assistant</p>

<form action="/login" method="post">

<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>

<button>Login</button>

</form>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

</div>

</body>
</html>
