<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#667eea,#764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    animation: fadeIn 1s ease;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #667eea;
    color: white;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="box">
    <h2>🏥 MediAssist AI</h2>
    <p style="color:gray;">Smart Healthcare Assistant</p>

    <form action="/login" method="post">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
</div>

<p style="position:absolute;bottom:10px;width:100%;text-align:center;font-size:12px;color:white;">
⚠️ AI-based suggestion only. Consult a doctor for accurate diagnosis.
</p>

</body>
</html>
