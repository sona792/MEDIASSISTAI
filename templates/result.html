<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: url('https://images.unsplash.com/photo-1588776814546-ec7e2c3c3c9b') no-repeat center center/cover;
    text-align:center;
    padding:40px;
}

.card {
    background: rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    width:400px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>🧾 Diagnosis Result</h2>

<p><b>{{ result }}</b></p>
<p>{{ reason }}</p>

<canvas id="chart" width="200" height="200"></canvas>

<br><br>

{% if level == "high" %}
<h3 style="color:red;">🚨 Emergency</h3>
{% elif level == "medium" %}
<h3 style="color:orange;">⚠️ Moderate Risk</h3>
{% else %}
<h3 style="color:green;">✅ Low Risk</h3>
{% endif %}

<br>

<a href="https://www.google.com/maps/search/hospitals+near+me" target="_blank">
<button style="background:red;color:white;">🚑 Nearby Hospitals</button>
</a>

<br><br>
<a href="/dashboard"><button>⬅ Back</button></a>

</div>

<script>
let level = "{{ level }}";

let data = 30;

if(level === "high") data = 90;
else if(level === "medium") data = 60;
else data = 30;

new Chart(document.getElementById("chart"), {
    type: 'doughnut',
    data: {
        labels: ["Risk", "Safe"],
        datasets: [{
            data: [data, 100-data]
        }]
    }
});
</script>

</body>
</html>
