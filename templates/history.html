<!DOCTYPE html>
<html>
<head>
<title>History</title>

<style>

body{
margin:0;
font-family:Segoe UI;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

.box{
background:white;
color:black;
width:600px;
margin:100px auto;
padding:30px;
border-radius:15px;
}

</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1579154204601-01588f351e67">
<div class="overlay"></div>

<div class="box">

<h2>Diagnosis History</h2>

<ul>

{% for item in history %}

<li>{{item}}</li>

{% endfor %}

</ul>

</div>

</body>
</html>
