<!DOCTYPE html>
<html>
<head>
<title>History</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    color:white;
    text-align:center;
}

/* BG */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index:-1;
}

/* CARD */
.card {
    background:white;
    color:black;
    padding:30px;
    margin:100px auto;
    width:350px;
    border-radius:15px;
}
</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1559757148-5c350d0d3c56">
<div class="overlay"></div>

<div class="card">

<h2>📜 Patient History</h2>

<ul>
{% for item in history %}
<li>{{ item[0] }}</li>
{% endfor %}
</ul>

<br>
<a href="/dashboard"><button>Back</button></a>

</div>

</body>
</html>
