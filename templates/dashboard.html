<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #f4f6f9;
    margin: 0;
    text-align: center;
}

/* NAVBAR */
.navbar {
    background: #333;
    padding: 15px;
}

.navbar a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    margin: 60px auto;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn1 { background:#667eea; color:white; }
.btn2 { background:#00c9a7; color:white; }
.logout { background:#e74c3c; color:white; }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/dashboard">Home</a>
    <a href="/diagnosis">Diagnosis</a>
    <a href="/history">History</a>
    <a href="/">🚪 Logout</a>
</div>

<!-- HEADER -->
<h2 style="margin-top:20px;">🏥 MediAssist AI</h2>
<p style="color:gray;">Smart Healthcare Assistant</p>

<!-- CARD -->
<div class="card">
    <h2>📊 Dashboard</h2>

    <a href="/diagnosis">
        <button class="btn1">🧠 Start Diagnosis</button>
    </a>

    <a href="/history">
        <button class="btn2">📜 View History</button>
    </a>

    <a href="/">
        <button class="logout">🚪 Logout</button>
    </a>
</div>

<p style="font-size:12px;color:gray;margin-top:30px;">
⚠️ AI-based suggestion only. Consult a doctor for accurate diagnosis.
</p>

</body>
</html>
