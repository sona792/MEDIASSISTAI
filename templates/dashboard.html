<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family:'Segoe UI';
    background:#f4f6f9;
    text-align:center;
}

.card {
    background:white;
    padding:30px;
    margin:50px auto;
    width:300px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn1 {background:#667eea;color:white;}
.btn2 {background:#00c9a7;color:white;}
</style>
</head>

<body>

<div class="card">
<h2>📊 Dashboard</h2>

<a href="/diagnosis"><button class="btn1">🧠 Start Diagnosis</button></a>
<a href="/history"><button class="btn2">📜 View History</button></a>

</div>

</body>
</html>
