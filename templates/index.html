<!DOCTYPE html>
<html>
<head>
<title>Diagnosis</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index:-1;
}

/* CARD */
.card {
    background:white;
    padding:30px;
    margin:100px auto;
    width:320px;
    border-radius:15px;
    text-align:center;
}

input, button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button {
    background:#667eea;
    color:white;
    border:none;
}
</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1582750433449-648ed127bb54">
<div class="overlay"></div>

<div class="card">

<h2>🧠 AI Symptom Analysis</h2>
<p>Enter symptoms for smart healthcare diagnosis</p>

<form action="/predict" method="post">
<input name="symptoms" placeholder="fever, cough..." required>
<button>🔍 Analyze</button>
</form>

<br>

<button onclick="chat()">💬 Ask AI</button>

</div>

<script>
function chat() {
let q = prompt("Ask MediAssist AI:");
if(!q) return;

q=q.toLowerCase();

if(q.includes("fever")) alert("Stay hydrated & rest.");
else if(q.includes("cold")) alert("Take steam inhalation.");
else if(q.includes("chest")) alert("Consult doctor immediately.");
else alert("Consult doctor for accurate advice.");
}
</script>

</body>
</html>
