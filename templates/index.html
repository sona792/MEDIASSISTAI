<!DOCTYPE html>
<html>
<head>
<title>Diagnosis</title>

<style>
body {
    font-family: 'Segoe UI';
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* NAVBAR */
.navbar {
    background: #333;
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    margin-top: 20px;
}

/* CARD */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

input {
    padding: 10px;
    width: 100%;
    margin: 10px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/dashboard">Home</a>
    <a href="/diagnosis">Diagnosis</a>
    <a href="/history">History</a>
    <a href="/">🚪 Logout</a>
</div>

<!-- HEADER -->
<div class="header">
    <h2>🏥 MediAssist AI</h2>
    <p>Smart Healthcare Assistant</p>
</div>

<!-- MAIN CARD -->
<div class="container">
    <div class="card">

        <h2>Enter Symptoms</h2>

        <form action="/predict" method="post" onsubmit="showLoading()">
            <input name="symptoms" placeholder="fever, cough..." required>
            <button type="submit">🔍 Diagnose</button>
        </form>

        <p id="loading" style="display:none;color:gray;">🔄 Analyzing symptoms...</p>

        <br>

        <button onclick="chat()">💬 Ask AI</button>

    </div>
</div>

<!-- SCRIPT -->
<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}

function chat(){
    let q = prompt("Ask health question:");
    if(!q) return;

    q = q.toLowerCase();

    if(q.includes("fever")) alert("Stay hydrated and take rest.");
    else if(q.includes("cold")) alert("Try steam inhalation.");
    else alert("Consult a doctor.");
}
</script>

<p style="font-size:12px;color:white;text-align:center;margin-top:20px;">
⚠️ AI-based suggestion only. Consult a doctor for accurate diagnosis.
</p>

</body>
</html>
