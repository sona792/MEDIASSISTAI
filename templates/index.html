<!DOCTYPE html>
<html>
<head>
<title>Diagnosis</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index:-1;
}

/* CARD */
.card {
    background:white;
    padding:30px;
    margin:100px auto;
    width:320px;
    border-radius:15px;
    text-align:center;
}

input, button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button {
    background:#667eea;
    color:white;
    border:none;
}
</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1500&q=80">
<div class="overlay"></div>

<div class="card">

<h2>🧠 AI Symptom Analysis</h2>
<p>Enter symptoms for smart healthcare diagnosis</p>

<form action="/predict" method="post">
<input name="symptoms" placeholder="fever, cough..." required>
<button>🔍 Analyze</button>
</form>

<br>

<button onclick="chat()">💬 Ask AI</button>

</div>

<script>
function chat() {
    let q = prompt("💬 Ask MediAssist AI (your health question):");

    if (!q) return;

    q = q.toLowerCase();

    if (q.includes("fever")) {
        alert("🤖 Fever is usually caused by infections such as viral flu or dengue. It is important to stay hydrated, take adequate rest, and monitor your temperature. If fever persists for more than 2 days or becomes very high, consult a doctor immediately.");
    } 
    else if (q.includes("cold") || q.includes("cough")) {
        alert("🤖 Cold and cough are commonly caused by viral infections. You can take steam inhalation, drink warm fluids, and rest properly. If symptoms last for more than a few days or worsen, medical consultation is recommended.");
    } 
    else if (q.includes("headache")) {
        alert("🤖 Headaches can occur due to stress, dehydration, or lack of sleep. Try resting in a calm environment, drinking enough water, and avoiding screen exposure. Persistent headaches should be checked by a doctor.");
    } 
    else if (q.includes("stomach") || q.includes("vomit") || q.includes("nausea")) {
        alert("🤖 Stomach-related issues may be due to food poisoning or infection. Avoid oily or heavy foods, drink plenty of fluids, and maintain hygiene. If symptoms continue, seek medical advice.");
    } 
    else if (q.includes("chest") || q.includes("heart")) {
        alert("🚨 Chest pain may indicate serious heart-related problems. It is important not to ignore such symptoms. Please seek immediate medical attention.");
    } 
    else if (q.includes("breath") || q.includes("breathing")) {
        alert("🚨 Difficulty in breathing is a serious condition that may indicate respiratory issues like asthma or infection. Immediate medical attention is advised.");
    } 
    else {
        alert("🤖 Based on your question, it is recommended to maintain a healthy lifestyle and consult a medical professional for accurate diagnosis and treatment.");
    }
}
</script>
