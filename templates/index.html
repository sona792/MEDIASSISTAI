<!DOCTYPE html>
<html>
<head>
<title>Diagnosis</title>

<style>

body{
margin:0;
font-family:Segoe UI;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

.box{
background:white;
color:black;
width:400px;
margin:100px auto;
padding:30px;
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
width:100%;
border:none;
background:#0d6efd;
color:white;
border-radius:8px;
}

</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1581056771107-24ca5f033842">
<div class="overlay"></div>

<div class="box">

<h2>Enter Symptoms</h2>

<form action="/predict" method="post">

<input name="symptom1" placeholder="Symptom 1">
<input name="symptom2" placeholder="Symptom 2">
<input name="symptom3" placeholder="Symptom 3">

<button>Predict Disease</button>

</form>

</div>

</body>
</html>
